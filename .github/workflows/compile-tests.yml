name: Compile Examples

on:
  pull_request:
  push:
    branches: [main]

jobs:
  compile-examples:
    name: compile+run (${{ matrix.example }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - advection
          - capgen
          - chararg
          - constadv
          - constprop
          - ddthost
          - helloworld
          - kessler
          - nestedddt
          - tinyddt

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran

      - name: Install xdsl-ccpp
        run: python -m pip install -e .

      - name: Build and run ${{ matrix.example }} (CPU)
        run: make -f examples/${{ matrix.example }}/Makefile check
