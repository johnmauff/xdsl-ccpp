name: Compile Examples

on:
  pull_request:
  push:
    branches: [main]

jobs:
  compile-examples:
    name: compile+run (${{ matrix.example }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - advection
          - advection_flat_host
          - capgen
          - chararg
          - constadv
          - constprop
          - ddthost
          - helloworld
          - kessler
          - nestedddt
          - tinyddt
        # constadv/constprop are known-failing (newest examples, still under
        # active development) — tracked in
        # https://github.com/johnmauff/xdsl-ccpp/issues/4
        # Not the FC=f77 build-config bug (fixed separately); a real, separate
        # issue in these two examples. Remove this override once fixed.
        include:
          - example: constadv
            expected_failure: true
          - example: constprop
            expected_failure: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran

      - name: Install xdsl-ccpp
        run: python -m pip install -e .

      - name: Build and run ${{ matrix.example }} (CPU)
        continue-on-error: ${{ matrix.expected_failure == true }}
        run: make -f examples/${{ matrix.example }}/Makefile check
